name: Test and build flatpak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Setup Flathub
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install SDKs
        run: |
          flatpak install --user -y flathub org.freedesktop.Sdk//25.08
          flatpak install --user -y flathub org.freedesktop.Platform//25.08

      - name: Debug paths
        run: |
          pwd
          ls -R

      - name: Build discord-rpc
        run: |
          flatpak-builder --user --disable-cache --stop-at=discord-rpc build_dir $GITHUB_WORKSPACE/org.srb2.SRB2Kart.yaml
